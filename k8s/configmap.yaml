apiVersion: v1
kind: ConfigMap
metadata:
  name: fastapi-config
  namespace: default
data:
  DATABASE_PORT: "5432"
  ALGORITHM: "HS256"
  ACCESS_TOKEN_EXPIRE_MINUTES: "30"
  # DATABASE_HOSTNAME is injected by the deploy workflow from Terraform outputs
  # DATABASE_NAME, DATABASE_USERNAME are injected from GitHub Secrets
  # DATABASE_PASSWORD, SECRET_KEY are in the fastapi-secrets Secret (not here)

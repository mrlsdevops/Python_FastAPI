name: Deploy Lambda (Auth)

on:
  push:
    branches: [main]
    paths:
      - "lambda/**"
      - "terraform/modules/lambda/**"
      - "terraform/modules/api_gateway/**"

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}

jobs:
  deploy:
    name: Package & Deploy Lambda
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Lambda dependencies
        run: |
          pip install \
            python-jose[cryptography] \
            passlib[bcrypt] \
            "psycopg[binary]" \
            boto3 \
            -t lambda/package/

      - name: Copy handler code
        run: cp lambda/login_handler.py lambda/package/

      - name: Zip Lambda package
        run: |
          cd lambda/package
          zip -r ../../lambda/login.zip .
          cd ../..
          echo "Package size: $(du -sh lambda/login.zip)"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy Lambda function
        run: |
          aws lambda update-function-code \
            --function-name ${{ secrets.PROJECT_NAME }}-dev-login \
            --zip-file fileb://lambda/login.zip \
            --region ${{ env.AWS_REGION }}

          # Wait for update to complete before publishing
          aws lambda wait function-updated \
            --function-name ${{ secrets.PROJECT_NAME }}-dev-login

          echo "Lambda deployed successfully"

name: Deploy to EKS

on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - "k8s/**"
      - "terraform/envs/app/**"

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}

jobs:
  # ── 1. Provision / update app infra via Terraform ──────────────────────────
  infra:
    name: Terraform App Infra
    runs-on: ubuntu-latest
    environment: dev
    outputs:
      ecr_url: ${{ steps.tf_outputs.outputs.ecr_url }}
      cluster_name: ${{ steps.tf_outputs.outputs.cluster_name }}
      rds_host: ${{ steps.tf_outputs.outputs.rds_host }}

    defaults:
      run:
        working-directory: terraform/envs/app

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: true

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=app/dev/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ secrets.TF_LOCK_TABLE }}"

      - name: Terraform Plan & Apply
        env:
          TF_VAR_aws_region: ${{ env.AWS_REGION }}
          TF_VAR_project: ${{ secrets.PROJECT_NAME }}
          TF_VAR_env: dev
          TF_VAR_network_state_bucket: ${{ secrets.TF_STATE_BUCKET }}
          TF_VAR_network_state_key: ${{ secrets.NETWORK_STATE_KEY }}
          TF_VAR_db_name: ${{ secrets.DB_NAME }}
          TF_VAR_db_username: ${{ secrets.DB_USERNAME }}
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
          TF_VAR_lambda_package_path: "../../../lambda/login.zip"
        run: |
          terraform apply -auto-approve

      - name: Capture Terraform outputs
        id: tf_outputs
        run: |
          echo "ecr_url=$(terraform output -raw ecr_repository_url)" >> $GITHUB_OUTPUT
          echo "cluster_name=$(terraform output -raw eks_cluster_name)" >> $GITHUB_OUTPUT
          echo "rds_host=$(terraform output -raw rds_host)" >> $GITHUB_OUTPUT

  # ── 2. Build Docker image and push to ECR ──────────────────────────────────
  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: infra
    outputs:
      image: ${{ steps.image.outputs.tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: login_ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image
        id: image
        env:
          ECR_URL: ${{ needs.infra.outputs.ecr_url }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_URL:$IMAGE_TAG -t $ECR_URL:latest ./app
          docker push $ECR_URL:$IMAGE_TAG
          docker push $ECR_URL:latest
          echo "tag=$ECR_URL:$IMAGE_TAG" >> $GITHUB_OUTPUT

  # ── 3. Deploy to EKS ───────────────────────────────────────────────────────
  deploy:
    name: Deploy to EKS
    runs-on: ubuntu-latest
    needs: [infra, build]

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --name ${{ needs.infra.outputs.cluster_name }} \
            --region ${{ env.AWS_REGION }}

      - name: Apply ConfigMap
        env:
          DB_HOST: ${{ needs.infra.outputs.rds_host }}
        run: |
          sed -i "s|# DATABASE_HOSTNAME.*|DATABASE_HOSTNAME: \"$DB_HOST\"|" k8s/configmap.yaml
          kubectl apply -f k8s/configmap.yaml

      - name: Create / update secrets
        run: |
          kubectl create secret generic fastapi-secrets \
            --from-literal=DATABASE_PASSWORD=${{ secrets.DB_PASSWORD }} \
            --from-literal=DATABASE_USERNAME=${{ secrets.DB_USERNAME }} \
            --from-literal=DATABASE_NAME=${{ secrets.DB_NAME }} \
            --from-literal=SECRET_KEY=${{ secrets.SECRET_KEY }} \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy to EKS
        env:
          IMAGE: ${{ needs.build.outputs.image }}
        run: |
          sed -i "s|image: .*|image: $IMAGE|" k8s/deployment.yaml
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml
          kubectl apply -f k8s/ingress.yaml
          kubectl rollout status deployment/fastapi --timeout=120s
